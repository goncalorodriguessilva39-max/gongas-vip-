<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GONGAS V4 ULTRA VIP</title>
    <style>
        @keyframes rgb { 0% { border-color: red; box-shadow: 0 0 15px red; } 50% { border-color: #00ff99; box-shadow: 0 0 15px #00ff99; } 100% { border-color: red; box-shadow: 0 0 15px red; } }
        body { background: #000; color: #00ff99; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #login { text-align: center; border: 2px solid; animation: rgb 2s infinite; padding: 30px; border-radius: 15px; background: #0a0a0a; width: 280px; }
        input[type=password] { background: #000; border: 1px solid #00ff99; color: #fff; padding: 12px; margin: 15px 0; text-align: center; width: 80%; border-radius: 5px; outline: none; font-weight: bold; }
        #painel { display: none; width: 340px; border: 1px solid #00ff99; padding: 15px; background: rgba(10,10,10,0.98); border-radius: 15px; position: relative; }
        .header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 15px; padding-bottom: 10px; }
        .section-title { font-size: 12px; color: #fff; background: #333; padding: 3px 10px; border-radius: 3px; margin-top: 10px; display: inline-block; }
        .option { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .bar { width: 100px; accent-color: #00ff99; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #00ff99; }
        #console { background: #000; height: 100px; font-size: 10px; padding: 10px; border: 1px solid #333; margin-top: 15px; overflow-y: auto; color: #00ff99; display: none; }
        .btn { width: 100%; padding: 15px; background: #00ff99; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; margin-top: 15px; text-transform: uppercase; }
        .badge-vip { color: gold; font-size: 10px; font-weight: bold; border: 1px solid gold; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div id="login">
    <h2 style="color:white; margin:0;">GONGAS <span style="color:#00ff99">V4</span></h2>
    <p style="font-size:10px; color:#666;">AUTENTICAÇÃO NECESSÁRIA</p>
    <input type="password" id="pass" placeholder="SENHA DE ACESSO">
    <button class="btn" onclick="entrar()">ENTRAR</button>
</div>

<div id="painel">
    <div class="header">
        <h3 style="margin:0; color:white;">GONGAS V4 ULTRA <span class="badge-vip">PRO</span></h3>
        <small style="color:#666;">Status: <span style="color:#00ff99">ONLINE</span></small>
    </div>

    <span class="section-title">COMBATE (AIM)</span>
    <div class="option">
        <span>Aimbot 100%</span>
        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>
    <div class="option">
        <span>Mira Grudante</span>
        <input type="range" class="bar" value="100">
    </div>
    <div class="option">
        <span>No Recoil</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <span class="section-title">VISUAL & MAPA</span>
    <div class="option">
        <span>Antena Cabeça</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>
    <div class="option">
        <span>Linha Laser</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <span class="section-title">SISTEMA & VELOCIDADE</span>
    <div class="option">
        <span>Regedit Mobile</span>
        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>
    <div class="option">
        <span>Velocidade x2</span>
        <input type="range" class="bar" value="0">
    </div>
    <div class="option">
        <span>FPS Ultra (120hz)</span>
        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>

    <button class="btn" id="injBtn" onclick="injetar()">ATIVAR FUNÇÕES V4</button>
    <div id="console"></div>
</div>

<script>
    function entrar() {
        if(document.getElementById('pass').value.toUpperCase() === "VIP") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
        } else { alert("SENHA INCORRETA!"); }
    }

    function injetar() {
        const btn = document.getElementById('injBtn');
        btn.innerHTML = "INJETANDO...";
        btn.style.background = "#555";
        const c = document.getElementById('console');
        c.style.display = 'block';
        const logs = [
            "> [SISTEMA] Iniciando Bypass V4...",
            "> [MEMÓRIA] Modificando offsets de mira...",
            "> [HACK] Antena Cabeça carregada.",
            "> [HACK] Regedit aplicado ao sistema.",
            "> [LOG] Limpando rastros do jogo...",
            "> [INFO] Proteção Antiban Ativa.",
            "> [OK] SUCESSO! APROVEITE O GONGAS VIP!"
        ];
        let i = 0;
        let t = setInterval(() => {
            if(i < logs.length) { c.innerHTML += logs[i] + "<br>"; i++; c.scrollTop = c.scrollHeight; }
            else { 
                clearInterval(t);
                setTimeout(() => {
                    document.body.innerHTML = "<div style='text-align:center; padding:50px; border: 2px solid #00ff99; margin: 20px; border-radius: 15px; background:#0a0a0a; animation: rgb 1s infinite;'><h1 style='color:#00ff99'>GONGAS V4 ATIVO</h1><p style='color:white'>As funções foram injetadas com sucesso!</p><button onclick='location.reload()' style='background:#00ff99; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;'>VOLTAR</button></div>";
                }, 1000);
            }
        }, 800);
    }
</script>
</body>
</html>
